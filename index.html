<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Ökuleiðsögn Pro - LOKAGERÐ</title>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />

    <style>
        :root {
            --danger: #e63946;
            --safe: #0056b3;
            --bg: #000000;
            --text: #ffffff;
            --accent: #4db8ff;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        #map {
            height: 100vh;
            width: 100%;
            z-index: 1;
            background: #1a1a1a;
            transition: filter 0.5s;
        }

        #search-container {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.95);
            z-index: 2000;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #search-container input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            color: #000;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        #lang-selector {
            position: absolute;
            top: 145px;
            right: 15px;
            z-index: 2000;
        }

        #lang-selector select {
            padding: 10px;
            border-radius: 8px;
            background: #333;
            color: white;
            border: 1px solid white;
            cursor: pointer;
        }

        #battery-toast {
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 12px 25px;
            border-radius: 30px;
            z-index: 9999;
            transition: all 0.5s ease-in-out;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: center;
            width: 80%;
            justify-content: center;
            pointer-events: none;
        }

        #safety-side-btns {
            position: absolute;
            bottom: 120px;
            left: 15px;
            z-index: 2500;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .side-btn {
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 55px;
            height: 55px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: none;
        }

        .panic-btn {
            border-radius: 50%;
            background: #ff9800;
            font-size: 18px;
        }

        .gps-btn {
            border-radius: 50%;
            background: white;
            color: black;
            font-size: 24px;
        }

        .weather-icon {
            background: none !important;
            border: none !important;
        }

        .wind-arrow {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }

        #stats-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100px;
            background: #111;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 2000;
            border-radius: 20px 20px 0 0;
            border-top: 1px solid #333;
        }

        #stats-bar small {
            color: #aaa;
        }

        #stats-bar .value {
            color: var(--accent);
            font-weight: bold;
            font-size: 18px;
        }

        #start-btn {
            background: #34a853;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }

        .leaflet-routing-container {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="battery-toast">🔋 <span id="toast-msg"></span></div>

    <div id="search-container">
        <input type="text" id="start-in" placeholder="Ræsing...">
        <input type="text" id="end-in" placeholder="Áfangastaður..."
               onchange="localStorage.setItem('last_dest', this.value)">
    </div>

    <div id="lang-selector">
        <select id="lang-sw" onchange="changeLang()">
            <option value="is">🇮🇸 IS</option>
            <option value="en">🇺🇸 EN</option>
            <option value="pl">🇵🇱 PL</option>
            <option value="de">🇩🇪 DE</option>
            <option value="fr">🇫🇷 FR</option>
            <option value="zh">🇨🇳 ZH</option>
        </select>
    </div>

    <div id="safety-side-btns">
        <button class="side-btn gps-btn" onclick="locateMe()">🎯</button>
        <button class="side-btn panic-btn" onclick="window.open('https://safetravel.is', '_blank')">112</button>
    </div>

    <div id="map"></div>

    <div id="stats-bar">
        <div style="text-align:center">
            <small>KM</small>
            <div id="dist" class="value">--</div>
        </div>
        <button id="start-btn" onclick="startNavigation()">BYRJA</button>
        <div style="text-align:center">
            <small>MIN</small>
            <div id="time" class="value">--</div>
        </div>
    </div>

    <div id="error-bar" style="
        position:absolute;
        bottom:100px;
        left:0;
        right:0;
        background:#b00020;
        color:white;
        padding:8px 12px;
        font-size:13px;
        display:none;
        z-index:2100;
        text-align:center;
    ">
        <span id="error-msg"></span>
    </div>

    <div id="gps-toggle" style="
        position:absolute;
        bottom:220px;
        left:15px;
        z-index:2500;
    ">
        <button id="follow-btn" style="
            background:#222;
            color:white;
            border:1px solid #555;
            border-radius:20px;
            padding:6px 14px;
            font-size:12px;
            cursor:pointer;
        ">
            LIVE GPS: OFF
        </button>
    </div>

    <div id="voice-toggle" style="
        position:absolute;
        bottom:260px;
        left:15px;
        z-index:2500;
    ">
        <button id="voice-btn" style="
            background:#222;
            color:white;
            border:1px solid #555;
            border-radius:20px;
            padding:6px 14px;
            font-size:12px;
            cursor:pointer;
        ">
            VOICE: ON
        </button>
    </div>

    <div id="next-turn" style="
        position:absolute;
        bottom:110px;
        left:50%;
        transform:translateX(-50%);
        background:rgba(0,0,0,0.8);
        color:white;
        padding:8px 14px;
        border-radius:20px;
        font-size:13px;
        z-index:2100;
        display:none;
    ">
        <span id="next-turn-text"></span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([64.9, -18.5], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let currentLang = 'is';
        let isCharging = true;
        let routingControl = null;
        let userMarker = null;
        let weatherLayers = L.layerGroup().addTo(map);

        let followUser = false;
        let lastPosition = null;
        let currentSpeed = 0; // km/h
        let voiceEnabled = true;
        let lastInstructionIndex = -1;
        let currentRoute = null;

        const translations = {
            is: {
                start: "Ræsing...",
                end: "Áfangastaður...",
                startBtn: "BYRJA",
                toastBat: "Battery Mode virkt",
                toastFull: "Hleður - Full afköst",
                notFound: "Fannst ekki",
                startLabel: "Ræsing",
                endLabel: "Áfangastaður"
            },
            en: {
                start: "Starting point...",
                end: "Destination...",
                startBtn: "START",
                toastBat: "Battery Saving Mode",
                toastFull: "Charging - Full Power",
                notFound: "Not found",
                startLabel: "Start",
                endLabel: "End"
            },
            pl: {
                start: "Start...",
                end: "Cel...",
                startBtn: "START",
                toastBat: "Tryb Baterii",
                toastFull: "Ładowanie",
                notFound: "Nie znaleziono",
                startLabel: "Start",
                endLabel: "Koniec"
            },
            de: {
                start: "Start...",
                end: "Ziel...",
                startBtn: "START",
                toastBat: "Batteriemodus",
                toastFull: "Laden",
                notFound: "Nicht gefunden",
                startLabel: "Start",
                endLabel: "Ziel"
            },
            fr: {
                start: "Départ...",
                end: "Destination...",
                startBtn: "COMMENCER",
                toastBat: "Mode Batterie",
                toastFull: "En charge",
                notFound: "Pas trouvé",
                startLabel: "Départ",
                endLabel: "Arrivée"
            },
            zh: {
                start: "出发地...",
                end: "目的地...",
                startBtn: "开始导航",
                toastBat: "省电模式",
                toastFull: "充电中",
                notFound: "未找到",
                startLabel: "起点",
                endLabel: "终点"
            }
        };

        function changeLang() {
            currentLang = document.getElementById('lang-sw').value;
            const t = translations[currentLang];
            document.getElementById('start-in').placeholder = t.start;
            document.getElementById('end-in').placeholder = t.end;
            document.getElementById('start-btn').innerText = t.startBtn;
            localStorage.setItem('pref_lang', currentLang);
        }

        async function getCoords(name) {
            if (!name) return null;
            try {
                const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(name + ", Iceland")}`;
                const res = await fetch(url, {
                    headers: { 'Accept-Language': 'is' }
                });
                const d = await res.json();
                if (Array.isArray(d) && d.length > 0) {
                    return L.latLng(parseFloat(d[0].lat), parseFloat(d[0].lon));
                }
                return null;
            } catch (e) {
                console.error("Leitarvilla:", e);
                return null;
            }
        }

        function showError(msg) {
            const bar = document.getElementById('error-bar');
            const span = document.getElementById('error-msg');
            span.innerText = msg;
            bar.style.display = 'block';
        }

        function hideError() {
            const bar = document.getElementById('error-bar');
            bar.style.display = 'none';
        }

        function setNextTurn(text) {
            const box = document.getElementById('next-turn');
            const span = document.getElementById('next-turn-text');
            if (!text) {
                box.style.display = 'none';
                return;
            }
            span.innerText = text;
            box.style.display = 'inline-block';
        }

        async function updateWeather() {
            try {
                const response = await fetch('/api/vegagerdin');
                if (!response.ok) {
                    showError('Veðurþjónusta ekki tiltæk í augnablikinu.');
                    return;
                }
                const data = await response.json();
                if (!Array.isArray(data)) return;
                hideError();
                weatherLayers.clearLayers();

                data.forEach(s => {
                    if (!s.lat || !s.lon) return;
                    let color = s.vindhradi > 25 ? "#e63946"
                              : (s.vindhradi > 15 ? "#fbbc05" : "#34a853");
                    const icon = L.divIcon({
                        className: 'weather-icon',
                        html: `
                            <div class="wind-arrow" style="color:${color}">
                                <div style="transform:rotate(${s.vindatt_grd}deg); font-size:18px;">↑</div>
                                <div style="font-size:9px;background:rgba(0,0,0,0.8);padding:1px 3px;border-radius:3px;color:white;">
                                    ${Math.round(s.vindhradi)}
                                </div>
                            </div>`,
                        iconSize: [25, 25]
                    });
                    L.marker([s.lat, s.lon], { icon })
                        .bindPopup(`<b>${s.nafn}</b><br>${s.vindhradi} m/s`)
                        .addTo(weatherLayers);
                });
            } catch (e) {
                console.log("Veður ekki tiltækt (tengingarvandi).");
                showError('Veðurþjónusta ekki tiltæk (tengingarvandi).');
            }
        }

        function getTriggerDistance(speed) {
            if (speed <= 20) return 50;
            if (speed <= 30) return 75;
            if (speed <= 50) return 100;
            if (speed <= 70) return 200;
            if (speed <= 90) return 300;
            return 500;
        }

        function speakInstruction(text) {
            if (!voiceEnabled) return;
            if (!('speechSynthesis' in window)) return;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = currentLang === 'is' ? 'is-IS' : 'en-US';
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utter);
        }

        function formatInstructionText(step) {
            if (step.type === 'Roundabout' || step.type === 'roundabout') {
                if (step.exit) {
                    if (currentLang === 'is') {
                        return `Taktu ${step.exit}. út af hringtorgi`;
                    } else {
                        return `Take the ${step.exit} exit at the roundabout`;
                    }
                }
            }
            return step.text || '';
        }

        async function startNavigation() {
            const sT = document.getElementById('start-in').value.trim();
            const eT = document.getElementById('end-in').value.trim();
            if (!sT || !eT) return;

            const t = translations[currentLang];
            document.getElementById('start-btn').innerText = "...";

            const sC = await getCoords(sT);
            const eC = await getCoords(eT);

            if (!sC || !eC) {
                document.getElementById('start-btn').innerText = t.startBtn;
                showToast(t.notFound, true);
                return;
            }

            if (routingControl) map.removeControl(routingControl);

            routingControl = L.Routing.control({
                waypoints: [sC, eC],
                router: L.Routing.osrmv1({
                    serviceUrl: 'https://router.project-osrm.org/route/v1/driving'
                }),
                lineOptions: {
                    styles: [{
                        color: isCharging ? '#0056b3' : '#555',
                        opacity: 0.8,
                        weight: 6
                    }]
                },
                createMarker: (i, wp) => {
                    return L.marker(wp.latLng)
                        .bindPopup(i === 0 ? t.startLabel : t.endLabel);
                },
                addWaypoints: false,
                draggableWaypoints: false
            })
            .on('routesfound', function(e) {
                const r = e.routes[0];
                currentRoute = r;
                lastInstructionIndex = -1;

                document.getElementById('dist').innerText =
                    (r.summary.totalDistance / 1000).toFixed(1);
                document.getElementById('time').innerText =
                    Math.round(r.summary.totalTime / 60);
                document.getElementById('start-btn').innerText = t.startBtn;

                if (r.instructions && r.instructions.length > 0) {
                    const first = r.instructions[0];
                    const txt = formatInstructionText(first);
                    setNextTurn(txt);
                    speakInstruction(txt);
                }
            })
            .addTo(map);

            map.fitBounds([sC, eC], { padding: [50, 50] });
        }

        function locateMe() {
            followUser = true;
            document.getElementById('follow-btn').innerText = 'LIVE GPS: ON';
            map.locate({ watch: true, setView: true, maxZoom: 14, enableHighAccuracy: true });
        }

        map.on('locationfound', (e) => {
            if (lastPosition) {
                const dx = map.distance(lastPosition.latlng, e.latlng);
                const dt = (e.timestamp - lastPosition.timestamp) / 1000;
                if (dt > 0) {
                    const speedMS = dx / dt;
                    currentSpeed = Math.round(speedMS * 3.6);
                }
            }

            lastPosition = {
                latlng: e.latlng,
                timestamp: e.timestamp
            };

            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.circleMarker(e.latlng, {
                radius: 9,
                color: 'white',
                weight: 2,
                fillColor: '#4db8ff',
                fillOpacity: 1
            }).addTo(map);

            if (followUser) {
                map.setView(e.latlng, Math.max(map.getZoom(), 13));
            }

            document.getElementById('start-in').value =
                currentLang === 'is' ? "Mín staðsetning" : "My Location";

            if (currentRoute && currentRoute.instructions) {
                const instr = currentRoute.instructions;

                for (let i = 0; i < instr.length; i++) {
                    const step = instr[i];
                    if (typeof step.lat === 'undefined' || typeof step.lng === 'undefined') {
                        continue;
                    }

                    const stepLatLng = L.latLng(step.lat, step.lng);
                    const dist = map.distance(e.latlng, stepLatLng);
                    const trigger = getTriggerDistance(currentSpeed);

                    if (i >= lastInstructionIndex) {
                        const txt = formatInstructionText(step);
                        setNextTurn(`${Math.round(dist)} m · ${txt}`);
                    }

                    if (dist <= trigger && i > lastInstructionIndex) {
                        lastInstructionIndex = i;
                        const txt = formatInstructionText(step);
                        speakInstruction(txt);
                        break;
                    }
                }
            }

            if (currentRoute) {
                const dRoute = distanceToRoute(e.latlng, currentRoute);
                if (dRoute > 120) {
                    showError('Út af leið – endurreikna leið...');
                    const destText = document.getElementById('end-in').value.trim();
                    if (destText) {
                        getCoords(destText).then(newDest => {
                            hideError();
                            if (!newDest) return;
                            if (routingControl) map.removeControl(routingControl);

                            const t = translations[currentLang];

                            routingControl = L.Routing.control({
                                waypoints: [e.latlng, newDest],
                                router: L.Routing.osrmv1({
                                    serviceUrl: 'https://router.project-osrm.org/route/v1/driving'
                                }),
                                lineOptions: {
                                    styles: [{
                                        color: isCharging ? '#0056b3' : '#555',
                                        opacity: 0.8,
                                        weight: 6
                                    }]
                                },
                                createMarker: (i, wp) => {
                                    return L.marker(wp.latLng)
                                        .bindPopup(i === 0 ? t.startLabel : t.endLabel);
                                },
                                addWaypoints: false,
                                draggableWaypoints: false
                            })
                            .on('routesfound', function(e2) {
                                const r2 = e2.routes[0];
                                currentRoute = r2;
                                lastInstructionIndex = -1;

                                document.getElementById('dist').innerText =
                                    (r2.summary.totalDistance / 1000).toFixed(1);
                                document.getElementById('time').innerText =
                                    Math.round(r2.summary.totalTime / 60);

                                if (r2.instructions && r2.instructions.length > 0) {
                                    const first = r2.instructions[0];
                                    const txt = formatInstructionText(first);
                                    setNextTurn(txt);
                                    speakInstruction(txt);
                                }
                            })
                            .addTo(map);

                            map.fitBounds([e.latlng, newDest], { padding: [50, 50] });
                        });
                    }
                }
            }
        });

        function distanceToRoute(latlng, route) {
            if (!route || !route.coordinates) return Infinity;
            const coords = route.coordinates;
            let min = Infinity;
            for (let i = 0; i < coords.length; i++) {
                const c = coords[i];
                const p = L.latLng(c.lat, c.lng);
                const d = map.distance(latlng, p);
                if (d < min) min = d;
            }
            return min;
        }

        function varAccent() {
            return getComputedStyle(document.documentElement)
                .getPropertyValue('--accent') || '#4db8ff';
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('battery-toast');
            const span = document.getElementById('toast-msg');
            span.innerText = msg;
            toast.style.borderColor = isError ? '#e63946' : varAccent();
            toast.style.color = isError ? '#e63946' : varAccent();
            toast.style.top = "20px";
            setTimeout(() => { toast.style.top = "-80px"; }, 3000);
        }

        async function initBattery() {
            if (!navigator.getBattery) return;
            const b = await navigator.getBattery();
            const up = () => {
                isCharging = b.charging;
                document.getElementById('map').style.filter =
                    isCharging ? "" : "brightness(60%) contrast(1.1)";
                const t = translations[currentLang];
                document.getElementById('toast-msg').innerText =
                    isCharging ? t.toastFull : t.toastBat;
                document.getElementById('battery-toast').style.top = "20px";
                setTimeout(() => {
                    document.getElementById('battery-toast').style.top = "-80px";
                }, 4000);
            };
            b.onchargingchange = up;
            up();
        }

        window.onload = () => {
            const sl = localStorage.getItem('pref_lang');
            if (sl) document.getElementById('lang-sw').value = sl;
            changeLang();
            initBattery();
            updateWeather();
            setInterval(updateWeather, 300000);
            const sd = localStorage.getItem('last_dest');
            if (sd) document.getElementById('end-in').value = sd;

            document.getElementById('follow-btn').addEventListener('click', () => {
                followUser = !followUser;
                document.getElementById('follow-btn').innerText =
                    followUser ? 'LIVE GPS: ON' : 'LIVE GPS: OFF';
                if (followUser && lastPosition) {
                    map.setView(lastPosition.latlng, Math.max(map.getZoom(), 13));
                }
            });

            document.getElementById('voice-btn').addEventListener('click', () => {
                voiceEnabled = !voiceEnabled;
                document.getElementById('voice-btn').innerText =
                    voiceEnabled ? 'VOICE: ON' : 'VOICE: OFF';
                if (!voiceEnabled && 'speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                }
            });
        };
    </script>
</body>
</html>
